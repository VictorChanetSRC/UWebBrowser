name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Releases are keyed to the version in src-tauri/tauri.conf.json.
  # A push to main only releases when that version has no tag yet, so
  # regular pushes are free and bumping the version is what ships.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version and check for existing tag
        id: check
        run: |
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
            echo "Tag v$VERSION already exists - skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag v$VERSION does not exist - releasing."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: version
    if: needs.version.outputs.exists == 'false'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # trusted-signing-cli signs via Azure Trusted Signing. Cached so the
      # cargo install only pays its compile cost once.
      - name: Install trusted-signing-cli
        if: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: trusted-signing-cli

      # Signing config is injected here instead of living in tauri.conf.json
      # so local `tauri build` never tries (and fails) to reach Azure.
      - name: Configure Azure Trusted Signing
        id: sign
        shell: pwsh
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        run: |
          if (-not $env:AZURE_CLIENT_SECRET) {
            Write-Host "Azure Trusted Signing secrets not configured - building UNSIGNED."
            "args=--bundles nsis" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          $signCommand = "trusted-signing-cli -e $env:AZURE_ENDPOINT -a $env:AZURE_CODE_SIGNING_NAME -c $env:AZURE_CERT_PROFILE_NAME %1"
          $config = @{ bundle = @{ windows = @{ signCommand = $signCommand } } } | ConvertTo-Json -Depth 5
          Set-Content -Path "src-tauri/tauri.sign.conf.json" -Value $config -Encoding utf8
          "args=--bundles nsis --config src-tauri/tauri.sign.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "UWebBrowser v${{ needs.version.outputs.version }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ steps.sign.outputs.args }}
