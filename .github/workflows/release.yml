name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "brand/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Every push to main ships a release. The version is resolved in order:
  #   1. src-tauri/tauri.conf.json version, if it has no tag yet (manual bump)
  #   2. "release: X.Y.Z" in the head commit message (explicit minor/major)
  #   3. otherwise the patch version is bumped automatically
  # For 2 and 3 the bump is committed back to main so the repo always
  # matches what users are running. That commit can't retrigger this
  # workflow (pushes made with GITHUB_TOKEN never do).
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve release version
        id: resolve
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          FILE_VERSION=$(jq -r .version src-tauri/tauri.conf.json)

          # Manual bump: the file version is untagged, release it as-is.
          if ! git rev-parse -q --verify "refs/tags/v$FILE_VERSION" > /dev/null; then
            echo "Releasing manually set version $FILE_VERSION"
            echo "version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Explicit version in the commit message: "release: X.Y.Z"
          if [[ "$HEAD_MSG" =~ release:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            NEXT="${BASH_REMATCH[1]}"
            if git rev-parse -q --verify "refs/tags/v$NEXT" > /dev/null; then
              echo "::error::Commit message asks for $NEXT but tag v$NEXT already exists."
              exit 1
            fi
            echo "Using version $NEXT from commit message"
          else
            # Auto patch bump to the next free version.
            IFS=. read -r MA MI PA <<< "$FILE_VERSION"
            NEXT="$MA.$MI.$((PA + 1))"
            while git rev-parse -q --verify "refs/tags/v$NEXT" > /dev/null; do
              PA=$((PA + 1))
              NEXT="$MA.$MI.$PA"
            done
            echo "Auto-bumping patch version to $NEXT"
          fi

          jq --arg v "$NEXT" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          jq --arg v "$NEXT" '.version = $v' package.json > tmp.json && mv tmp.json package.json
          sed -i "0,/^version = \".*\"$/s//version = \"$NEXT\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v$NEXT [skip ci]"
          git push origin HEAD:main

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    needs: version
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_CLIENT_SECRET != '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.sha }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # trusted-signing-cli signs via Azure Trusted Signing. Cached so the
      # cargo install only pays its compile cost once.
      - name: Install trusted-signing-cli
        if: env.HAS_AZURE_SIGNING == 'true'
        uses: taiki-e/cache-cargo-install-action@7447f04c51f2ba27ca35e7f1e28fab848c5b3ba7 # v2
        with:
          tool: trusted-signing-cli

      # Signing config is injected here instead of living in tauri.conf.json
      # so local `tauri build` never tries (and fails) to reach Azure.
      - name: Configure Azure Trusted Signing
        id: sign
        shell: pwsh
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          AZURE_CERT_PROFILE_NAME: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
        run: |
          if (-not $env:AZURE_CLIENT_SECRET) {
            Write-Host "Azure Trusted Signing secrets not configured - building UNSIGNED."
            "args=--bundles nsis" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            exit 0
          }
          $signCommand = "trusted-signing-cli -e $env:AZURE_ENDPOINT -a $env:AZURE_CODE_SIGNING_NAME -c $env:AZURE_CERT_PROFILE_NAME %1"
          $config = @{ bundle = @{ windows = @{ signCommand = $signCommand } } } | ConvertTo-Json -Depth 5
          Set-Content -Path "src-tauri/tauri.sign.conf.json" -Value $config -Encoding utf8
          "args=--bundles nsis --config src-tauri/tauri.sign.conf.json" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Reads the passphrase from a secret; empty if the key is passwordless
          # (legacy) so this stays backward-compatible while allowing a rotation
          # to a password-protected key without touching the workflow.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: v${{ needs.version.outputs.version }}
          releaseName: "UWebBrowser v${{ needs.version.outputs.version }}"
          releaseBody: "See the assets below to download and install this version."
          # An unsigned build (Azure signing secrets absent) publishes as a
          # draft so it is never auto-delivered to users; a signed build ships
          # as a normal release.
          releaseDraft: ${{ env.HAS_AZURE_SIGNING != 'true' }}
          prerelease: false
          args: ${{ steps.sign.outputs.args }}
